<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת מיומנויות - דף הבית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-[#0f172a] text-white flex flex-col items-center justify-center p-6 text-center">

    <header class="mb-16 animate-fade-in">
        <h1 class="text-7xl font-black mb-4 italic tracking-tight">מערכת <span class="text-orange-500">מיומנויות</span></h1>
        <p class="text-2xl text-blue-300 font-light italic">פורטל ניהול ולמידה משולב</p>
    </header>

    <main class="grid md:grid-cols-3 gap-8 w-full max-w-5xl">
        <!-- Student Link -->
        <a href="student.html" class="glass p-10 rounded-[2.5rem] border-2 border-transparent hover:border-orange-500 transition-all duration-300 group shadow-xl">
            <div class="text-6xl mb-6 group-hover:scale-110 transition-transform">🎓</div>
            <h2 class="text-2xl font-bold mb-2">פורטל תלמיד</h2>
            <p class="text-gray-400 text-sm">ביצוע מטלות וצפייה במשוב מורים</p>
        </a>

        <!-- Teacher Link -->
        <a href="teacher.html" class="glass p-10 rounded-[2.5rem] border-2 border-transparent hover:border-blue-500 transition-all duration-300 group shadow-xl">
            <div class="text-6xl mb-6 group-hover:scale-110 transition-transform">🔑</div>
            <h2 class="text-2xl font-bold mb-2">פורטל מורה</h2>
            <p class="text-gray-400 text-sm">ניהול כיתות, רשימות תלמידים וציונים</p>
        </a>

        <!-- Admin Link -->
        <a href="admin.html" class="glass p-10 rounded-[2.5rem] border-2 border-transparent hover:border-red-500 transition-all duration-300 group shadow-xl">
            <div class="text-6xl mb-6 group-hover:scale-110 transition-transform">🛠️</div>
            <h2 class="text-2xl font-bold mb-2 text-center">ניהול מערכת</h2>
            <p class="text-gray-400 text-sm">סנכרון מול GitHub והעלאת תכנים</p>
        </a>
    </main>

    <footer class="mt-20 text-gray-500 text-sm font-medium">
        &copy; 2024 מערכת תרגול מיומנויות דיגיטליות | פותח עבור חינוך טכנולוגי
    </footer>

</body>
</html>
