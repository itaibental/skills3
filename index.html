<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת מיומנויות - ניהול</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-[#0f172a] text-white font-['Assistant']">

    <!-- Landing Screen -->
    <div id="landingScreen" class="h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black mb-4 text-white">מערכת <span class="text-orange-500">מיומנויות</span></h1>
        <p class="text-xl text-blue-300 mb-12">פורטל ניהול ולמידה</p>
        
        <div class="grid md:grid-cols-2 gap-8 w-full max-w-2xl">
            <div onclick="window.openLoginModal('student')" class="glass p-10 rounded-3xl cursor-pointer hover:border-orange-500 border-2 border-transparent transition group">
                <div class="text-6xl mb-4 group-hover:scale-110 transition">🎓</div>
                <h2 class="text-2xl font-bold">כניסת תלמיד</h2>
            </div>
            <div onclick="window.openLoginModal('teacher')" class="glass p-10 rounded-3xl cursor-pointer hover:border-blue-500 border-2 border-transparent transition group">
                <div class="text-6xl mb-4 group-hover:scale-110 transition">🔑</div>
                <h2 class="text-2xl font-bold">כניסת מורה</h2>
            </div>
        </div>
    </div>

    <!-- Teacher Login Modal -->
    <div id="teacherLoginModal" class="modal-overlay hidden">
        <div class="glass p-8 rounded-3xl w-full max-w-md relative text-right">
            <button onclick="window.closeLoginModals()" class="absolute top-4 left-4 text-gray-400 hover:text-white">✕</button>
            
            <div id="teacherGate" class="space-y-4">
                <h2 class="text-2xl font-black text-blue-500 mb-6">אימות צוות</h2>
                <input type="password" id="globalTeacherPass" class="w-full bg-black/40 border border-slate-700 rounded-xl p-4 text-white text-center" placeholder="סיסמת צוות">
                <button onclick="window.checkTeacherGate()" class="btn-primary w-full py-3">המשך</button>
            </div>

            <div id="teacherAuthFields" class="hidden space-y-4">
                <div class="flex border-b border-slate-700 mb-4">
                    <button id="tabLogin" onclick="window.switchTeacherMode('login')" class="flex-1 py-2 text-white border-b-2 border-blue-500">כניסה</button>
                    <button id="tabSignup" onclick="window.switchTeacherMode('signup')" class="flex-1 py-2 text-gray-500">רישום</button>
                </div>
                <input type="text" id="teacherUser" class="w-full bg-black/40 border border-slate-700 rounded-xl p-3 text-white text-right" placeholder="שם בית ספר">
                
                <div id="teacherLoginSelectContainer" class="hidden">
                    <select id="teacherIndexSelect" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white text-right"></select>
                </div>

                <input type="password" id="teacherPass" class="w-full bg-black/40 border border-slate-700 rounded-xl p-3 text-white text-right" placeholder="סיסמה אישית">
                
                <div id="newTeacherFields" class="hidden space-y-3">
                    <input type="text" id="deptHead" class="w-full bg-black/40 border border-slate-700 rounded-xl p-3 text-white text-right" placeholder="שם רכז">
                    <textarea id="teacherNamesInput" class="w-full bg-black/40 border border-slate-700 rounded-xl p-3 text-white text-right h-20" placeholder="שמות מורים (אחד בשורה)"></textarea>
                </div>
                <button onclick="window.loginTeacher()" class="btn-primary w-full py-3">התחבר</button>
            </div>
        </div>
    </div>

    <!-- Teacher Dashboard (Skeleton) -->
    <div id="teacherDashboard" class="hidden-section p-8">
        <header class="flex justify-between items-center border-b border-slate-800 pb-4 mb-8">
            <h1 class="text-3xl font-black text-blue-500">ניהול כיתה</h1>
            <p id="teacherProfileInfo" class="text-gray-400"></p>
        </header>
        <div class="grid lg:grid-cols-4 gap-8 text-right">
            <div class="glass p-6 rounded-2xl">
                <h3 class="font-bold mb-4">ניהול כיתות</h3>
                <select id="activeClassSelector" class="w-full bg-slate-800 p-2 rounded mb-4"></select>
                <input type="text" id="newClassNameInput" class="w-full bg-slate-800 p-2 rounded mb-2" placeholder="כיתה חדשה">
                <button onclick="window.addNewClass()" class="bg-blue-600 w-full py-2 rounded">הוסף</button>
            </div>
            <div class="lg:col-span-3 glass p-6 rounded-2xl">
                <table class="w-full">
                    <thead><tr class="text-gray-500 border-b border-slate-800"><th class="p-2 text-right">שם</th><th class="p-2 text-right">ת"ז</th><th class="p-2 text-center">פעולות</th></tr></thead>
                    <tbody id="rosterTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
