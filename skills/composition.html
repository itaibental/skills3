<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מטלת קומפוזיציה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 2rem; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="max-w-2xl mx-auto card">
        <h1 class="text-3xl font-bold text-orange-500 mb-4">תרגול קומפוזיציה</h1>
        <p class="mb-6">במטלה זו עליך לצאת לשטח ולצלם 3 שוטים המדגימים את "חוק השלישים".</p>
        
        <div class="space-y-4">
            <div class="p-4 bg-slate-800 rounded-lg">
                <h3 class="font-bold mb-2">שלב 1: שוט Medium</h3>
                <p class="text-sm text-gray-400">צלם אדם מהמותניים ומעלה, כאשר העיניים נמצאות בקו השליש העליון.</p>
            </div>
            <div class="p-4 bg-slate-800 rounded-lg">
                <h3 class="font-bold mb-2">שלב 2: שוט Close-up</h3>
                <p class="text-sm text-gray-400">התמקד בפנים, שים לב למרחב הדיבור (Nose room).</p>
            </div>
        </div>

        <button onclick="window.close()" class="mt-8 bg-orange-500 text-black font-bold py-2 px-6 rounded-lg">סיימתי, חזרה למערכת</button>
    </div>
</body>
</html>
